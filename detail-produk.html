<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detail Produk — CampusNeed</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="dashboard-style.css" />
</head>
<body>

  <div id="navbarMount"></div>

  <div class="app-container">
    <div id="detailContent">
      <div style="text-align:center; padding: 60px; color: var(--slate-400);">Memuat produk...</div>
    </div>
  </div>

  <div id="cartMount"></div>
  <div id="chatMount"></div>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('navbarMount').innerHTML = renderAppNavbar();
      document.getElementById('cartMount').innerHTML = renderCartSidebar();

      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');

      // Check seller listings first
      let product = ProductData.getById(id);
      if (!product) {
        const sellerListings = JSON.parse(localStorage.getItem('campusneed_seller_listings') || '[]');
        product = sellerListings.find(p => p.id === id);
      }

      if (!product) {
        document.getElementById('detailContent').innerHTML = `
          <div style="text-align:center; padding: 60px;">
            <h2 style="color: var(--slate-800); margin-bottom: 8px;">Produk tidak ditemukan</h2>
            <p style="color: var(--slate-500); margin-bottom: 24px;">ID produk tidak valid atau sudah dihapus.</p>
            <a href="dashboard.html" class="btn btn-primary">Kembali ke Dashboard</a>
          </div>
        `;
        return;
      }

      const reviews = SellerReviews.getForSeller(product.owner);
      const avgRating = SellerReviews.getAverageRating(product.owner);

      document.title = `${product.name} — CampusNeed`;

      document.getElementById('detailContent').innerHTML = `
        <div style="margin-bottom: 16px;">
          <a href="javascript:history.back()" style="display: inline-flex; align-items: center; gap: 6px; color: var(--slate-500); font-size: 14px; font-weight: 500; transition: color 0.2s;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            Kembali
          </a>
        </div>

        <div class="detail-layout">
          <div class="detail-gallery">
            <img src="${product.image}" alt="${product.name}" onerror="this.src='https://placehold.co/400x400/e2e8f0/94a3b8?text=No+Image'">
          </div>

          <div class="detail-info">
            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px;">
              <span class="badge ${product.type === 'sewa' ? 'badge-blue' : 'badge-purple'}">${product.type === 'sewa' ? 'Sewa' : 'Preloved'}</span>
              ${product.cod ? '<span class="badge badge-green">COD Tersedia</span>' : ''}
              ${product.verified ? '<span class="badge badge-green">Terverifikasi</span>' : ''}
            </div>

            <h1>${product.name}</h1>
            <div class="detail-price">
              Rp${product.price.toLocaleString('id-ID')}
              ${product.priceUnit ? `<small>${product.priceUnit}</small>` : ''}
            </div>

            <div class="detail-desc">${product.desc || 'Tidak ada deskripsi.'}</div>

            <div class="detail-meta-row">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <strong>Pemilik:</strong> ${product.owner}
            </div>
            <div class="detail-meta-row">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              <strong>Lokasi:</strong> ${product.location || 'Sekitar kampus'}
            </div>
            ${product.condition ? `
            <div class="detail-meta-row">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
              <strong>Kondisi:</strong> ${product.condition}
            </div>
            ` : ''}
            <div class="detail-meta-row">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" fill="#f59e0b"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
              <strong>Rating:</strong> ${avgRating} / 5.0 (${reviews.length} ulasan)
            </div>

            ${product.type === 'sewa' ? `
            <div style="margin-top: 16px;">
              <label class="form-label">Durasi Sewa (hari)</label>
              <div class="stepper">
                <button onclick="updateDays(-1)">−</button>
                <input type="number" id="daysInput" value="1" min="1" max="30" onchange="updateDays(0)">
                <button onclick="updateDays(1)">+</button>
              </div>
              <div style="font-size: 14px; color: var(--slate-500);" id="totalCalc">
                Total: Rp${product.price.toLocaleString('id-ID')}
              </div>
            </div>
            ` : ''}

            <div class="detail-actions">
              <button class="btn btn-primary btn-lg" onclick="addToCart()" style="flex: 1;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                Keranjang
              </button>
              <button class="btn btn-secondary btn-lg" onclick="openChatModal('${product.owner}')" style="flex: 1;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                Chat Penjual
              </button>
            </div>
          </div>
        </div>

        <!-- Reviews Section -->
        <div class="reviews-section">
          <h2 style="font-size: 20px; font-weight: 700; color: var(--slate-900); margin-bottom: 16px;">
            Ulasan Penjual
            <span style="font-size: 14px; font-weight: 500; color: var(--slate-500); margin-left: 8px;">
              ⭐ ${avgRating} (${reviews.length} ulasan)
            </span>
          </h2>
          ${reviews.map((r, i) => `
            <div class="review-card" style="animation-delay: ${i * 0.1}s">
              <div class="review-avatar">${r.user.substring(0, 2).toUpperCase()}</div>
              <div class="review-content">
                <div class="review-header">
                  <span class="review-user">${r.user}</span>
                  <span class="review-date">${r.date}</span>
                </div>
                <div class="review-stars">
                  ${Array(5).fill(0).map((_, i) => i < r.rating
                    ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="#f59e0b" stroke="#f59e0b" stroke-width="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>'
                    : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>'
                  ).join('')}
                </div>
                <div class="review-text">${r.text}</div>
              </div>
            </div>
          `).join('')}
        </div>
      `;

      // Store product for addToCart
      window._currentProduct = product;
    });

    function updateDays(delta) {
      const input = document.getElementById('daysInput');
      let val = parseInt(input.value) || 1;
      val = Math.max(1, Math.min(30, val + delta));
      input.value = val;
      const price = window._currentProduct.price;
      document.getElementById('totalCalc').textContent =
        'Total: Rp' + (price * val).toLocaleString('id-ID');
    }

    function addToCart() {
      const product = window._currentProduct;
      if (!product) return;

      const days = product.type === 'sewa'
        ? parseInt(document.getElementById('daysInput')?.value || 1)
        : null;

      Cart.addItem({
        id: product.id,
        name: product.name,
        price: product.price,
        image: product.image,
        type: product.type,
        qty: 1,
        days: days,
        owner: product.owner,
        priceUnit: product.priceUnit || '',
        cod: product.cod || false
      });
    }
  </script>

</body>
</html>
